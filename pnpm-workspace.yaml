packages:
  - 'apps/*'
  - '!apps/mobile' # Expo app: self-contained con npm (Metro + pnpm monorepo da fricción)
  - 'packages/*'
  - 'workers/*'

# Build scripts allowed to run in postinstall.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  sharp: true
  unrs-resolver: true
  msw: false
  esbuild: true
